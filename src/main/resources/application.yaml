spring:
  application:
    name: interviewai

  # PostgreSQL Database Configuration
  datasource:
    url: jdbc:postgresql://localhost:5432/interviewai_db
    username: postgres
    password: 1234
    driver-class-name: org.postgresql.Driver

  # JPA / Hibernate Configuration
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # File Upload Configuration
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# Server Configuration
server:
  port: 8080

# JWT Configuration
jwt:
  secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970337336763979244226452948404D6351655468576D5A7134743777217A25432A46
  expiration: 86400000  # 24 hours in milliseconds

# Logging Configuration
logging:
  level:
    com.project.interviewai: DEBUG
    org.springframework.security: DEBUG
