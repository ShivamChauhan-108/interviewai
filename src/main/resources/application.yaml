spring:
  application:
    name: interviewai

  # PostgreSQL Database Configuration
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/interviewai_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:huzoor}
    driver-class-name: org.postgresql.Driver

  # JPA / Hibernate Configuration
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # File Upload Configuration
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# Server Configuration
server:
  port: ${PORT:8080}

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970337336763979244226452948404D6351655468576D5A7134743777217A25432A46}
  expiration: 86400000  # 24 hours in milliseconds

# Logging Configuration
logging:
  level:
    com.project.interviewai: DEBUG
    org.springframework.security: DEBUG

# Gemini AI Configuration
gemini:
  api:
    key: ${GEMINI_API_KEY:your-gemini-api-key-here}
    url: https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent

# File Storage
app:
  upload:
    dir: ${UPLOAD_DIR:./uploads/resumes}
